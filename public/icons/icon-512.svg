<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="50%" style="stop-color:#F97316"/>
      <stop offset="100%" style="stop-color:#EA580C"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C0C0F"/>
      <stop offset="100%" style="stop-color:#050506"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.08"/>
      <stop offset="50%" style="stop-color:white;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="glowOrange" cx="50%" cy="55%" r="40%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:0"/>
    </radialGradient>
    <filter id="textGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#F97316" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fundo com cantos arredondados estilo iOS -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="510" height="510" rx="111" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1.5"/>
  <rect width="512" height="512" rx="112" fill="url(#glowOrange)"/>
  <rect width="512" height="280" rx="112" fill="url(#shineGrad)"/>

  <!-- Ondas decorativas -->
  <path d="M 80 200 Q 180 140 256 180 Q 340 220 432 160" fill="none" stroke="url(#orangeGrad)" stroke-width="3" stroke-opacity="0.2" stroke-linecap="round"/>
  <path d="M 80 220 Q 180 160 256 200 Q 340 240 432 180" fill="none" stroke="url(#orangeGrad)" stroke-width="2" stroke-opacity="0.1" stroke-linecap="round"/>

  <!-- R principal -->
  <g filter="url(#textGlow)">
    <text x="180" y="340" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif" font-size="260" font-weight="900" fill="white" letter-spacing="-8">R</text>
  </g>

  <!-- Ponto laranja -->
  <circle cx="355" cy="155" r="28" fill="url(#orangeGrad)" opacity="0.95"/>
  <circle cx="355" cy="155" r="12" fill="#050506" opacity="0.6"/>

  <!-- Badge IA -->
  <rect x="320" y="340" width="100" height="48" rx="24" fill="url(#orangeGrad)"/>
  <text x="370" y="372" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif" font-size="28" font-weight="800" fill="white" letter-spacing="2">IA</text>

  <!-- Linha inferior -->
  <rect x="140" y="400" width="232" height="3" rx="1.5" fill="url(#orangeGrad)" opacity="0.4"/>
</svg>